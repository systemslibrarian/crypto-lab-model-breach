name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main] # main is covered by the deploy workflow
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (round-trip · Theorem 1 · full attack)
        run: npm test

      - name: Build
        run: npm run build
