name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main] # main is covered by the deploy workflow
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (vitest: AESL KAT · AEAD round-trip · key recovery)
        run: npm test

      - name: Build
        run: npm run build
