<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" role="img" aria-label="A contract page split by a crack">
  <defs>
    <linearGradient id="crack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0b33c"/>
      <stop offset="1" stop-color="#f06050"/>
    </linearGradient>
  </defs>
  <!-- card background -->
  <rect x="1" y="1" width="46" height="46" rx="10" fill="#0b1328"/>
  <rect x="1.5" y="1.5" width="45" height="45" rx="9.5" fill="none" stroke="#2a3a67" stroke-width="1"/>
  <!-- left half of the contract -->
  <path d="M11 9h11l-2 4 2 4-2 4 2 4-2 4 2 4-2 4H11z" fill="#f5f3ea"/>
  <!-- right half, offset to read as 'broken' -->
  <path d="M26 9h11v30H26l2-4-2-4 2-4-2-4 2-4-2-4z" fill="#f5f3ea" opacity="0.92"/>
  <!-- fine-print lines -->
  <g stroke="#a4b3cc" stroke-width="1.4" stroke-linecap="round">
    <line x1="14" y1="15" x2="19" y2="15"/>
    <line x1="29" y1="15" x2="34" y2="15"/>
    <line x1="14" y1="20" x2="18" y2="20"/>
    <line x1="30" y1="20" x2="34" y2="20"/>
    <line x1="14" y1="25" x2="19" y2="25"/>
    <line x1="29" y1="25" x2="34" y2="25"/>
    <line x1="14" y1="30" x2="18" y2="30"/>
    <line x1="30" y1="30" x2="34" y2="30"/>
  </g>
  <!-- the crack down the middle -->
  <path d="M24 9l-2 4 2 4-2 4 2 4-2 4 2 4-2 4" fill="none" stroke="url(#crack)" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
